services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nihongo-app
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DB_HOST=shared-postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=nihongo
      - DB_SSLMODE=disable
      - REDIS_HOST=nihongo-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DAILY_CRON_ENABLED=true
      - DEFAULT_TIMEZONE=Asia/Seoul
    networks:
      - shared
      - nihongo-internal
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: nihongo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - nihongo-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: nihongo-web
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@shared-postgres:5432/nihongo
      - BOT_TOKEN=${BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - shared
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.nihongo-web.rule=Host(`nihongo.dltmxm.link`)"
      - "traefik.http.routers.nihongo-web.entrypoints=web"
      - "traefik.http.services.nihongo-web.loadbalancer.server.port=3000"

networks:
  shared:
    name: shared_shared
    external: true
  proxy:
    external: true
  nihongo-internal:
    driver: bridge

volumes:
  redis_data:
